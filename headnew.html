<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do An 1 - Custom Mobile Text</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="public/css/effect.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <header class="container-fluid p-0 position-relative bg-white border-bottom">
        <div class="container">
            <div class="row align-items-center py-3">
                
                <nav class="col-md-5 d-none d-md-block">
                    <ul class="nav">
                        <li class="nav-item"><a class="nav-link text-dark px-2" href="#">Home</a></li>
                        <li class="nav-item"><a class="nav-link text-dark px-2" href="#">Pages</a></li>
                        <li class="nav-item"><a class="nav-link text-dark px-2" href="#">Women</a></li>
                        <li class="nav-item"><a class="nav-link text-dark px-2" href="#">Men</a></li>
                        <li class="nav-item"><a class="nav-link text-dark px-2" href="#">Blog</a></li>
                    </ul>
                </nav>

                <div class="logo col-4 col-md-2 text-start text-md-center">
                    <img src="public/img/logo_350x.png" alt="Salehub" class="img-fluid" style="max-height: 40px;">
                </div>

                <div class="tool col-8 col-md-5 d-flex justify-content-end align-items-center gap-3">
    
                    <!-- Search PC: Thêm d-flex và align-items-center vào thẻ bọc để icon và chữ thẳng hàng -->
                    <div class="search-box-pc d-none d-md-flex align-items-center">
                        <input type="text" class="search-input-pc" placeholder="Tìm kiếm...">
                        <i class="bi bi-search fs-5 lh-1"></i> <!-- Thêm lh-1 để xóa khoảng trống thừa của icon -->
                        <span class="d-none d-md-inline ms-1">Search</span>
                    </div>

                    <!-- Account: Ép d-flex và align-items-center để icon và chữ luôn song song -->
                    <div class="account-link d-flex align-items-center">
                        <i class="bi bi-person fs-4 lh-1"></i>
                        <span class="d-none d-md-inline ms-1">Account</span>
                    </div>

                    <!-- Cart: Thêm lh-1 vào icon và chỉnh lại badge -->
                    <div class="cart-link d-flex align-items-center">
                        <i class="bi bi-bag fs-4 lh-1"></i>
                        <span class="d-none d-md-inline ms-1">My Cart</span>
                        <span class="badge bg-warning text-dark rounded-circle ms-1 d-flex align-items-center justify-content-center" style="width: 20px; height: 20px; font-size: 0.75rem;">0</span>
                    </div>

                    <!-- Nút 3 sọc: Ép d-flex để icon bên trong không bị lệch dòng -->
                    <button class="navbar-toggler d-md-none border-0 p-0 d-flex align-items-center" type="button" data-bs-toggle="collapse" data-bs-target="#menuMobile">
                        <i class="bi bi-list fs-1 lh-1"></i>
                    </button>
                    
                </div>

                <div class="collapse d-md-none col-12" id="menuMobile">
                    <ul class="nav flex-column border-top mt-2">
                        <li class="nav-item"><a class="nav-link text-dark py-2 border-bottom" href="#">Home</a></li>
                        <li class="nav-item"><a class="nav-link text-dark py-2 border-bottom" href="#">Women</a></li>
                        <li class="nav-item"><a class="nav-link text-dark py-2 border-bottom" href="#">Men</a></li>
                    </ul>
                </div>

                <div class="col-12 d-block d-md-none mt-2">
                    <div class="input-group">
                        <input type="text" class="form-control" placeholder="Search...">
                        <span class="input-group-text bg-dark text-white"><i class="bi bi-search"></i></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="banner-section position-relative">
            <img src="public/img/background1.jpg" class="w-100 d-none d-md-block" style="object-fit: cover; min-height: 500px;" alt="Banner PC">
            <img src="public/img/bn-is_4_193x142_crop_center.png" class="w-100 d-block d-md-none" style="object-fit: cover; min-height: 400px;" alt="Banner Mobile">
            
            <div class="boxrun boxrun-responsive position-absolute top-50 translate-middle-y text-white p-5" style="left: 10%;">
                
                <h3 class="fw-bold fs-6 mb-3">
                    <span class="d-none d-md-inline">NEW COLLECTION</span> <span class="d-md-none" style="color: aliceblue;">NEW COLLECTION</span> </h3>

                <h2 class="display-4 fw-bold mb-0">
                    <span class="d-none d-md-inline">FIND YOUR</span>
                    <span class="d-md-none">FASHION</span>
                </h2>

                <h1 class="display-1 fw-bold mb-4">
                    <span class="d-none d-md-inline">PERFECT</span>
                    <span class="d-md-none">GLASSES</span>
                </h1>

                <p class="fs-5 mb-4 p-desc">
                    <span class="d-none d-md-inline">Uncompromising in style, quality and performance.</span> <span class="d-md-none">Best eyeglasses for women to channel your inner Clark Kent</span> </p>

                <button class="btn btn-light rounded-0 px-4 py-2">
                    <a href="#" class="text-decoration-none text-dark fw-bold">SHOP THE COLLECTION</a>
                </button>
            </div>
        </div>
    </header>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
